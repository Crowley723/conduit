services:
  redis:
    command: 'redis-server --save 60 1 --loglevel warning'
    image: redis:latest
    ports:
      - "127.0.0.1:6379:6379"
    container_name: conduit-dev-redis

  postgres:
    image: postgres:latest
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: conduit
    container_name: conduit-dev-postgres

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    container_name: conduit-dev-adminer
